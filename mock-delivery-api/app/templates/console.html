<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Delivery Console</title>
    <link rel="stylesheet" href="/static/console.css" />
  </head>
  <body>
    <main class="console-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">MOCK DELIVERY API</p>
          <h1>Mock Delivery Console</h1>
        </div>
        <a class="kds-link" href="http://127.0.0.1:5173/kds" target="_blank" rel="noreferrer">
          KDS 열기
        </a>
      </header>

      <section class="panel webhook-panel" aria-label="Webhook 설정">
        <span>DeepOrder Webhook URL</span>
        <code id="webhook-url">{{ webhook_url }}</code>
      </section>

      <section class="grid">
        <div class="panel controls-panel">
          <h2>주문 생성/전송</h2>
          <label class="field">
            <span>Store ID</span>
            <input id="store-id" value="STORE_001" />
          </label>
          <div class="button-row">
            <button id="create-order-button" type="button">샘플 주문 생성</button>
            <button id="send-order-button" type="button" disabled>생성된 주문 전송</button>
            <button id="refresh-logs-button" class="secondary" type="button">
              Webhook 로그 새로고침
            </button>
          </div>
          <p id="status-message" class="status-message">샘플 주문을 생성해 주세요.</p>
        </div>

        <div class="panel preview-panel">
          <h2>최근 생성 주문 Payload</h2>
          <pre id="payload-preview">아직 생성된 주문이 없습니다.</pre>
        </div>
      </section>

      <section class="panel logs-panel">
        <div class="section-head">
          <h2>최근 Webhook 전송 로그</h2>
          <span id="log-count">0건</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>상태</th>
                <th>HTTP</th>
                <th>주문</th>
                <th>응답/오류</th>
              </tr>
            </thead>
            <tbody id="logs-body">
              <tr>
                <td colspan="5" class="empty">로그를 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/console.js"></script>
  </body>
</html>
